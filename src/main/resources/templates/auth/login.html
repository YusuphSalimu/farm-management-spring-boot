<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farm Management System</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="preload" as="image" href="/images/farm-bg.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a2814; /* shows instantly before image loads */
            background-image: url('/images/farm-bg.jpg');
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                    135deg,
                    rgba(10, 40, 20, 0.82) 0%,
                    rgba(15, 60, 30, 0.70) 40%,
                    rgba(0, 0, 0, 0.50) 100%
            );
            z-index: 0;
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(144,238,144,0.6);
            border-radius: 50%;
            animation: float linear infinite;
        }

        .particle:nth-child(1)  { left: 10%; animation-duration: 8s;  animation-delay: 0s; }
        .particle:nth-child(2)  { left: 20%; animation-duration: 12s; animation-delay: 2s; width:5px; height:5px; }
        .particle:nth-child(3)  { left: 35%; animation-duration: 9s;  animation-delay: 1s; width:2px; height:2px; }
        .particle:nth-child(4)  { left: 50%; animation-duration: 14s; animation-delay: 3s; }
        .particle:nth-child(5)  { left: 65%; animation-duration: 10s; animation-delay: 0.5s; width:3px; height:3px; }
        .particle:nth-child(6)  { left: 75%; animation-duration: 11s; animation-delay: 4s; width:6px; height:6px; }
        .particle:nth-child(7)  { left: 85%; animation-duration: 7s;  animation-delay: 1.5s; width:2px; height:2px; }
        .particle:nth-child(8)  { left: 90%; animation-duration: 13s; animation-delay: 2.5s; }
        .particle:nth-child(9)  { left: 5%;  animation-duration: 15s; animation-delay: 0.8s; width:3px; height:3px; }
        .particle:nth-child(10) { left: 45%; animation-duration: 9s;  animation-delay: 3.5s; width:5px; height:5px; }

        @keyframes float {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Top nav */
        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
        }

        .nav-brand i {
            color: #90ee90;
            font-size: 22px;
        }

        .btn-nav {
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Login Card */
        .login-wrapper {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        .login-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(76,175,80,0.4);
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 6px;
        }

        .login-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-label {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 13px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.4); }

        .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: #4caf50;
            color: white;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.2);
        }

        .btn-signin {
            width: 100%;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(76,175,80,0.3);
            margin-top: 8px;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(76,175,80,0.4);
        }

        .divider {
            border-color: rgba(255,255,255,0.15);
            margin: 24px 0;
        }

        .register-link {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .register-link a {
            color: #90ee90;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
        }

        .register-link a:hover {
            color: #4caf50;
            text-decoration: underline;
        }

        .alert-glass {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .alert-glass.error {
            border-color: rgba(239,83,80,0.5);
            background: rgba(239,83,80,0.15);
        }

        .alert-glass.success {
            border-color: rgba(76,175,80,0.5);
            background: rgba(76,175,80,0.15);
        }
    </style>
</head>
<body>

<!-- Particles -->
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<!-- Top Nav -->
<nav class="top-nav">
    <a href="/" class="nav-brand">
        <i class="fas fa-seedling"></i>
        FarmManager Tanzania
    </a>
    <a th:href="@{/register}" class="btn-nav">
        <i class="fas fa-user-plus me-1"></i> Register
    </a>
</nav>

<!-- Login Card -->
<div class="login-wrapper">
    <div class="login-card">

        <div class="login-icon">
            <i class="fas fa-seedling"></i>
        </div>

        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to your account</p>

        <!-- Alerts -->
        <div th:if="${errorMessage}"
             class="alert-glass error">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${logoutMessage}"
             class="alert-glass success">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${logoutMessage}"></span>
        </div>
        <div th:if="${param.registered}"
             class="alert-glass success">
            <i class="fas fa-check-circle me-2"></i>
            Registration successful! Please sign in.
        </div>
        <div th:if="${param.error}"
             class="alert-glass error">
            <i class="fas fa-exclamation-circle me-2"></i>
            Invalid email or password, or your account has been suspended.
            Please contact the administrator.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-envelope me-1"></i>
                    Email
                </label>
                <input type="email" name="username"
                       class="form-control"
                       placeholder="mkulima@gmail.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-lock me-1"></i>
                    Password
                </label>
                <input type="password" name="password"
                       class="form-control"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-signin">
                <i class="fas fa-sign-in-alt me-2"></i>
                Sign In
            </button>
        </form>

        <hr class="divider">

        <p class="register-link">
            Don't have an account?
            <a th:href="@{/register}">Register Here</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
