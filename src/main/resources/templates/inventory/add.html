<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>Add Inventory - Farm Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div class="topbar-title">
            <i class="fas fa-plus me-2 text-warning"></i>Add Inventory Item
        </div>
        <div class="topbar-right">
            <a th:href="@{/inventory}" class="btn-farm-outline">
                <i class="fas fa-arrow-left"></i> Back to Inventory
            </a>
        </div>
    </div>

    <div class="page-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="farm-card">
                    <div class="farm-card-header">
                        <h5>
                            <i class="fas fa-plus-circle me-2 text-warning"></i>
                            Item Details
                        </h5>
                    </div>
                    <div class="p-4">
                        <form th:action="@{/inventory/add}"
                              method="post" class="farm-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label>Item Name *</label>
                                    <input type="text" name="itemName"
                                           class="form-control"
                                           placeholder="e.g. Mbegu za Mahindi"
                                           required>
                                </div>
                                <div class="col-md-6">
                                    <label>Category *</label>
                                    <select name="category"
                                            class="form-select" required
                                            onchange="updateUnitOptions()">
                                        <option value="">Select Category</option>
                                        <option value="Seed">Seed (Mbegu)</option>
                                        <option value="Fertilizer">Fertilizer (Mbolea)</option>
                                        <option value="Equipment">Equipment (Zana)</option>
                                        <option value="Pesticide">Pesticide (Dawa)</option>
                                        <option value="Other">Other (Nyingine)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label>Quantity *</label>
                                    <input type="number" name="quantity"
                                           class="form-control"
                                           placeholder="e.g. 50"
                                           step="0.01" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label>Unit *</label>
                                    <select name="unit" id="unitSelect"
                                            class="form-select" required>
                                        <option value="">Select Unit</option>
                                        <option value="kg">Kilograms (kg)</option>
                                        <option value="g">Grams (g)</option>
                                        <option value="litres">Litres</option>
                                        <option value="ml">Millilitres (ml)</option>
                                        <option value="bags">Bags (Magunia)</option>
                                        <option value="pieces">Pieces (Vipande)</option>
                                        <option value="tonnes">Tonnes</option>
                                        <option value="packets">Packets (Pakiti)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label>Supplier</label>
                                    <input type="text" name="supplier"
                                           class="form-control"
                                           placeholder="e.g. Dodoma Agro Supplies">
                                </div>
                                <div class="col-md-6">
                                    <label>Purchase Date</label>
                                    <input type="date" name="purchaseDate"
                                           id="purchaseDate"
                                           class="form-control">
                                </div>
                                <div class="col-12">
                                    <label>Notes</label>
                                    <textarea name="notes"
                                              class="form-control" rows="3"
                                              placeholder="Additional notes..."></textarea>
                                </div>
                                <div class="col-12 d-flex gap-3 mt-2">
                                    <button type="submit" class="btn-farm">
                                        <i class="fas fa-save"></i> Save Item
                                    </button>
                                    <a th:href="@{/inventory}"
                                       class="btn-farm-outline">
                                        <i class="fas fa-times"></i> Cancel
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Set max purchase date to today
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('purchaseDate').max = today;
    });
</script>
</body>
</html>
