<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>Inventory - Farm Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .category-badge-seed {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .category-badge-fertilizer {
            background: #fff3e0;
            color: #e65100;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .category-badge-equipment {
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .category-badge-other {
            background: #f3e5f5;
            color: #6a1b9a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .category-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div class="topbar-title">
            <i class="fas fa-boxes me-2 text-warning"></i>Inventory Management
        </div>
        <div class="topbar-right">
            <a th:href="@{/inventory/add}" class="btn-farm">
                <i class="fas fa-plus"></i> Add Item
            </a>
        </div>
    </div>

    <div class="page-content">

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert-farm-success mb-4">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert-farm-error mb-4">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Total Items</div>
                            <div class="stat-value mt-1"
                                 th:text="${#lists.size(inventoryList)}">0</div>
                        </div>
                        <div class="stat-icon green">
                            <i class="fas fa-boxes"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Seeds</div>
                            <div class="stat-value mt-1 text-success"
                                 th:text="${inventoryList.?[category == 'Seed'].size()}">0</div>
                        </div>
                        <div class="stat-icon green">
                            <i class="fas fa-seedling"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Fertilizers</div>
                            <div class="stat-value mt-1 text-warning"
                                 th:text="${inventoryList.?[category == 'Fertilizer'].size()}">0</div>
                        </div>
                        <div class="stat-icon orange">
                            <i class="fas fa-flask"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Equipment</div>
                            <div class="stat-value mt-1 text-primary"
                                 th:text="${inventoryList.?[category == 'Equipment'].size()}">0</div>
                        </div>
                        <div class="stat-icon blue">
                            <i class="fas fa-tools"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="farm-card">
            <div class="farm-card-header">
                <h5>
                    <i class="fas fa-boxes me-2 text-warning"></i>
                    All Inventory Items
                    <span class="badge bg-warning text-dark ms-2"
                          th:text="${#lists.size(inventoryList)}">0</span>
                </h5>
            </div>
            <div class="table-responsive">
                <table class="farm-table">
                    <thead>
                    <tr>
                        <th>Item</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Unit</th>
                        <th>Supplier</th>
                        <th>Purchase Date</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(inventoryList)}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="fas fa-boxes fa-3x mb-3 d-block text-warning opacity-50"></i>
                            No inventory items yet.
                            <a th:href="@{/inventory/add}"
                               class="text-success fw-bold">
                                Add your first item
                            </a>
                        </td>
                    </tr>
                    <tr th:each="item : ${inventoryList}">
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="category-icon"
                                     th:style="${item.category == 'Seed'} ?
                                            'background:#e8f5e9;color:#2e7d32' :
                                            (${item.category == 'Fertilizer'} ?
                                            'background:#fff3e0;color:#e65100' :
                                            (${item.category == 'Equipment'} ?
                                            'background:#e3f2fd;color:#1565c0' :
                                            'background:#f3e5f5;color:#6a1b9a'))">
                                    <i th:class="${item.category == 'Seed'} ?
                                            'fas fa-seedling' :
                                            (${item.category == 'Fertilizer'} ?
                                            'fas fa-flask' :
                                            (${item.category == 'Equipment'} ?
                                            'fas fa-tools' :
                                            'fas fa-box'))"></i>
                                </div>
                                <span class="fw-semibold"
                                      th:text="${item.itemName}">-</span>
                            </div>
                        </td>
                        <td>
                                <span th:class="${item.category == 'Seed'} ?
                                    'category-badge-seed' :
                                    (${item.category == 'Fertilizer'} ?
                                    'category-badge-fertilizer' :
                                    (${item.category == 'Equipment'} ?
                                    'category-badge-equipment' :
                                    'category-badge-other'))"
                                      th:text="${item.category}">-</span>
                        </td>
                        <td th:text="${item.quantity}">-</td>
                        <td th:text="${item.unit}">-</td>
                        <td th:text="${item.supplier != null ? item.supplier : '-'}">-</td>
                        <td th:text="${item.purchaseDate != null ? item.purchaseDate : '-'}">-</td>
                        <td th:text="${item.notes != null ? item.notes : '-'}">-</td>
                        <td>
                            <a th:href="@{/inventory/edit/{id}(id=${item.id})}"
                               class="btn btn-sm btn-outline-success me-1">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:action="@{/inventory/delete/{id}(id=${item.id})}"
                                  method="post" class="d-inline">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this item?')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
