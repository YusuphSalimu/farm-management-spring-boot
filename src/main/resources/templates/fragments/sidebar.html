<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>
<body>
<div th:fragment="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <img th:src="@{/favicon.ico}"
             style="width:36px;height:36px;border-radius:8px;"
             alt="FarmManager">
        <div>
            <div class="brand-name">Farm Management</div>
            <div class="brand-sub">System</div>
        </div>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar">
            <img th:if="${user.profilePicture != 'default-avatar.png'}"
                 th:src="@{'/uploads/profiles/' + ${user.profilePicture}}"
                 alt="Profile">
            <div th:if="${user.profilePicture == 'default-avatar.png'}"
                 class="avatar-initials"
                 th:text="${#strings.substring(user.fullName, 0, 1)}">U</div>
        </div>
        <div class="user-info">
            <div class="user-name" th:text="${user.fullName}">User</div>
            <div class="user-role"
                 th:text="${user.role.name == 'ROLE_ADMIN' ? 'Administrator' : 'Farmer'}">
                Farmer
            </div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
        </a>
        <a th:href="@{/crops}"
           th:classappend="${activePage == 'crops'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-leaf"></i>
            <span>Crops</span>
        </a>
        <a th:href="@{/inventory}"
           th:classappend="${activePage == 'inventory'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-boxes"></i>
            <span>Inventory</span>
        </a>
        <a th:href="@{/harvest}"
           th:classappend="${activePage == 'harvest'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-wheat-awn"></i>
            <span>Harvest Records</span>
        </a>
        <a th:href="@{/farms}"
           th:classappend="${activePage == 'farms'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-map"></i>
            <span>My Farms</span>
        </a>
        <a th:href="@{/finance}"
           th:classappend="${activePage == 'finance'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-coins"></i>
            <span>Finance & Sales</span>
        </a>

        <div sec:authorize="hasAuthority('ROLE_ADMIN')">
            <div class="nav-divider">Admin</div>
            <a th:href="@{/admin/dashboard}"
               th:classappend="${activePage == 'admin'} ? 'active' : ''"
               class="nav-item">
                <i class="fas fa-users-cog"></i>
                <span>Manage Users</span>
            </a>
        </div>
    </nav>

    <div class="sidebar-bottom">
        <a th:href="@{/profile}"
           th:classappend="${activePage == 'profile'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Profile</span>
        </a>
        <a th:href="@{/settings}"
           th:classappend="${activePage == 'settings'} ? 'active' : ''"
           class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </a>
        <a th:href="@{/logout}" class="nav-item logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </a>
    </div>
</div>
</body>
</html>
