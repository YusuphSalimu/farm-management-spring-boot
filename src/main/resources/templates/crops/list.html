<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crops - Farm Management System</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .crop-image {
            width: 52px; height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .crop-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div class="topbar-title">
            <i class="fas fa-leaf me-2 text-success"></i>Crop Management
        </div>
        <div class="topbar-right">
            <a th:href="@{/crops/add}" class="btn-farm">
                <i class="fas fa-plus"></i> Add New Crop
            </a>
        </div>
    </div>

    <div class="page-content">

        <!-- Alerts -->
        <div th:if="${successMessage}"
             class="alert-farm-success mb-4">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}"
             class="alert-farm-error mb-4">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <div class="farm-card">
            <div class="farm-card-header">
                <h5>
                    <i class="fas fa-leaf me-2 text-success"></i>
                    All Crops
                    <span class="badge bg-success ms-2"
                          th:text="${#lists.size(crops)}">0</span>
                </h5>
            </div>
            <div class="table-responsive">
                <table class="farm-table">
                    <thead>
                    <tr>
                        <th>Crop</th>
                        <th>Type</th>
                        <th>Planting Date</th>
                        <th>Expected Harvest</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(crops)}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="fas fa-leaf fa-3x mb-3 d-block text-success opacity-50"></i>
                            No crops added yet.
                            <a th:href="@{/crops/add}"
                               class="text-success fw-bold">
                                Add your first crop
                            </a>
                        </td>
                    </tr>
                    <tr th:each="crop : ${crops}">
                        <td>
                            <div class="crop-name-cell">
                                <img th:src="${cropImageMap != null and cropImageMap[crop.cropName] != null}
                                        ? ${cropImageMap[crop.cropName]}
                                        : 'https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=100&h=100&fit=crop'"
                                     class="crop-image"
                                     th:alt="${crop.cropName}">
                                <span th:text="${crop.cropName}"
                                      class="fw-600">-</span>
                            </div>
                        </td>
                        <td th:text="${crop.cropType}">-</td>
                        <td th:text="${crop.plantingDate}">-</td>
                        <td th:text="${crop.expectedHarvestDate}">-</td>
                        <td th:text="${crop.fieldLocation}">-</td>
                        <td>
                                <span th:class="${crop.status == 'GROWING'} ?
                                    'badge-growing' :
                                    (${crop.status == 'HARVESTED'} ?
                                    'badge-harvested' : 'badge-failed')"
                                      th:text="${crop.status}">-</span>
                        </td>
                        <td th:text="${crop.notes != null ? crop.notes : '-'}">-</td>
                        <td>
                            <a th:href="@{/crops/edit/{id}(id=${crop.id})}"
                               class="btn btn-sm btn-outline-success me-1">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:action="@{/crops/delete/{id}(id=${crop.id})}"
                                  method="post" class="d-inline">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Are you sure you want to delete this crop?')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
